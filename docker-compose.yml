services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scaffold
      POSTGRES_PASSWORD: scaffold
      POSTGRES_DB: scaffold
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scaffold"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BIND_ADDR: 0.0.0.0:8080
      # Set USE_MOCKS=0 and provide real keys to use live external services.
      USE_MOCKS: "1"
      DATABASE_URL: postgres://scaffold:scaffold@postgres:5432/scaffold
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  pgdata:
